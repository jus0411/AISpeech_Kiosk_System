version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: malmal_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: qwer1234
      MYSQL_DATABASE: malmal_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: .
    container_name: malmal_backend
    restart: always
    environment:
      - DB_URL=jdbc:mysql://db:3306/malmal_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - DB_USERNAME=root
      - DB_PASSWORD=qwer1234
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TOSS_SECRET_KEY=${TOSS_SECRET_KEY}
    depends_on:
      - db

  caddy:
    image: caddy:alpine
    container_name: malmal_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dist:/usr/share/caddy/html
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
volumes:
  db_data:
  caddy_data:
  caddy_config:
