version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: malmal_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_here
      MYSQL_DATABASE: malmal_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: .
    container_name: malmal_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://db:3306/malmal_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - DB_USERNAME=root
      - DB_PASSWORD=root_password_here
    depends_on:
      - db

volumes:
  db_data:
